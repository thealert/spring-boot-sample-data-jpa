<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>连词成句</title>
  <style>
    :root {
      --panel: rgba(22, 24, 32, 0.72);
      --panel-border: rgba(255, 255, 255, 0.1);
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --chip: rgba(51, 65, 85, 0.95);
      --chip-hi: rgba(71, 85, 105, 0.98);
      --slot: rgba(15, 23, 42, 0.55);
      --ok: #4ade80;
      --bad: #fb7185;
      --font: "SF Pro Text", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100dvh;
    }

    body {
      font-family: var(--font);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
      transition: background-color 0.8s ease, background-image 0.8s ease;
      background-attachment: fixed;
      min-height: 100dvh;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: var(--scene-overlay-opacity, 0.55);
      background: var(--scene-overlay, radial-gradient(ellipse 80% 60% at 50% 0%, rgba(255,255,255,0.12), transparent 55%));
      background-size: var(--scene-overlay-size, cover);
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 560px;
      margin: 0 auto;
      padding: 1rem 0.9rem 2rem;
    }

    header {
      text-align: center;
      margin-bottom: 0.75rem;
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 700;
      margin: 0 0 0.25rem;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.35);
    }

    header p {
      margin: 0;
      font-size: 0.8rem;
      color: var(--muted);
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.4);
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 1.25rem;
      margin-bottom: 0.75rem;
      font-size: 0.85rem;
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.35);
    }

    .stats span {
      color: var(--muted);
    }

    .stats strong {
      color: var(--accent);
    }

    .zh-card {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 18px;
      padding: 1.15rem 1rem 1.25rem;
      margin-bottom: 1rem;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(12px);
    }

    .zh-label {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .zh-text {
      font-size: 1.12rem;
      line-height: 1.75;
      text-align: justify;
      letter-spacing: 0.03em;
    }

    .work-card {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      padding: 1rem 0.85rem 1.1rem;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(10px);
    }

    .section-label {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }

    .sentence-row {
      display: flex;
      flex-wrap: wrap;
      align-items: stretch;
      gap: 0.45rem;
      min-height: 3.1rem;
      margin-bottom: 1rem;
    }

    .slot {
      min-width: 3.2rem;
      min-height: 2.85rem;
      flex: 1 1 auto;
      max-width: 100%;
      border-radius: 12px;
      border: 2px dashed rgba(255, 255, 255, 0.18);
      background: var(--slot);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.2rem;
      transition: border-color 0.2s, background 0.2s;
    }

    .slot.drag-over {
      border-color: var(--accent);
      background: rgba(56, 189, 248, 0.12);
    }

    .slot.shake {
      animation: shake 0.45s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .bank {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      min-height: 3rem;
      align-items: flex-start;
      align-content: flex-start;
      border-radius: 12px;
      padding: 0.25rem;
      transition: outline 0.15s, background 0.15s;
    }

    .bank.drag-over {
      outline: 2px dashed rgba(56, 189, 248, 0.45);
      background: rgba(56, 189, 248, 0.06);
    }

    .chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.45rem 0.75rem;
      border-radius: 999px;
      background: var(--chip);
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text);
      cursor: grab;
      user-select: none;
      touch-action: none;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.2);
      transition: transform 0.12s, box-shadow 0.15s;
    }

    .chip:hover {
      background: var(--chip-hi);
    }

    .chip.dragging {
      cursor: grabbing;
      z-index: 100000;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.45);
      opacity: 0.98;
      transition: none !important;
      margin: 0;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 0.85rem;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      font-family: inherit;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
      transition: filter 0.15s, transform 0.08s;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      color: #0f172a;
      font-weight: 600;
    }

    .btn-primary:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .feedback {
      text-align: center;
      min-height: 1.35rem;
      font-size: 0.88rem;
      margin-top: 0.65rem;
    }

    .feedback.ok {
      color: var(--ok);
    }

    .feedback.bad {
      color: var(--bad);
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 0.3rem;
      margin-top: 0.75rem;
    }

    .dots i {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.25);
    }

    .dots i.done {
      background: var(--accent);
    }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(15, 23, 42, 0.88);
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .overlay.show {
      display: flex;
    }

    .modal {
      background: rgba(30, 41, 59, 0.98);
      border-radius: 18px;
      padding: 1.5rem;
      max-width: 340px;
      width: 100%;
      text-align: center;
      border: 1px solid var(--panel-border);
    }

    .modal h2 {
      margin: 0 0 0.5rem;
      font-size: 1.2rem;
    }

    .modal p {
      margin: 0 0 1rem;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .modal .big {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    footer {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.72rem;
      color: var(--muted);
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.35);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>连词成句</h1>
      <p>看中文意思，把下方单词拖进横线排成正确的英文句</p>
    </header>

    <div class="stats">
      <div>得分 <strong id="score">0</strong></div>
      <div>第 <strong id="round">1</strong> / <span id="total">8</span> 关</div>
    </div>

    <div class="zh-card">
      <div class="zh-label">中文句意</div>
      <div class="zh-text" id="zhLine"></div>
    </div>

    <div class="work-card">
      <div class="section-label">英文句槽（按顺序摆放）</div>
      <div class="sentence-row" id="sentenceRow" aria-live="polite"></div>
      <div class="section-label">单词池（含干扰词，可拖回此处）</div>
      <div class="bank" id="bank"></div>
      <div class="actions">
        <button type="button" class="btn" id="btnClear">清空槽位</button>
        <button type="button" class="btn" id="btnHint">提示一词</button>
        <button type="button" class="btn btn-primary" id="btnCheck" disabled>检查</button>
      </div>
      <div class="feedback" id="feedback"></div>
      <div class="dots" id="dots"></div>
    </div>

    <div class="overlay" id="overlay">
      <div class="modal">
        <h2 id="endTitle">完成</h2>
        <p id="endDesc"></p>
        <div class="big" id="endScore">0</div>
        <button type="button" class="btn btn-primary" id="btnRestart">再玩一局</button>
      </div>
    </div>

    <footer>拖拽支持触屏 · 干扰词不必使用</footer>
  </div>

        btnClear: document.getElementById("btnClear"),
        btnHint: document.getElementById("btnHint"),
        dots: document.getElementById("dots"),
        overlay: document.getElementById("overlay"),
        endTitle: document.getElementById("endTitle"),
        endDesc: document.getElementById("endDesc"),
        endScore: document.getElementById("endScore"),
        btnRestart: document.getElementById("btnRestart")
      };

      let dragState = null;

      function shuffle(arr) {
        const a = arr.slice();
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      function applyScene(level) {
        document.body.style.backgroundColor = level.baseColor || "#0f172a";
        document.body.style.backgroundImage = level.bgImage;
        document.body.style.backgroundSize = level.bgSize;
        document.body.style.backgroundPosition = level.bgPosition;
        document.body.style.backgroundRepeat = level.bgRepeat;
        document.documentElement.style.setProperty("--scene-overlay", level.overlay || "transparent");
        document.documentElement.style.setProperty(
          "--scene-overlay-opacity",
          level.overlayOpacity != null ? String(level.overlayOpacity) : "0.5"
        );
        document.documentElement.style.setProperty("--scene-overlay-size", level.overlaySize || "cover");
      }

      function makeChip(text) {
        const id = "c" + chipSeq++;
        chips[id] = { id: id, text: text };
        const d = document.createElement("div");
        d.className = "chip";
        d.textContent = text;
        d.dataset.chipId = id;
        d.addEventListener("pointerdown", onChipPointerDown);
        return d;
      }

      function clearChipsMap() {
        for (const k in chips) delete chips[k];
        chipSeq = 0;
      }

      function slotCount() {
        return LEVELS[levelIndex].words.length;
      }

      function filledCount() {
        return el.sentenceRow.querySelectorAll(".slot .chip").length;
      }

      function updateCheckBtn() {
        el.btnCheck.disabled = locked || filledCount() !== slotCount();
      }

      function setFeedback(t, kind) {
        el.feedback.textContent = t;
        el.feedback.className = "feedback" + (kind ? " " + kind : "");
      }

      function renderDots() {
        el.dots.innerHTML = "";
        for (let i = 0; i < LEVELS.length; i++) {
          const dot = document.createElement("i");
          if (i < levelIndex) dot.classList.add("done");
          el.dots.appendChild(dot);
        }
      }

      function placeChipIn(elParent, chipEl) {
        const existing = elParent.querySelector(".chip");
        if (existing && existing !== chipEl) {
          el.bank.appendChild(existing);
        }
        elParent.appendChild(chipEl);
      }

      function onChipPointerDown(e) {
        if (locked) return;
        const chip = e.target.closest(".chip");
        if (!chip) return;
        e.preventDefault();
        const rect = chip.getBoundingClientRect();
        const offsetX = e.clientX - rect.left;
        const offsetY = e.clientY - rect.top;
        dragState = {
          chip: chip,
          offsetX: offsetX,
          offsetY: offsetY,
          from: chip.parentElement
        };
        chip.classList.add("dragging");
        document.body.appendChild(chip);
        chip.style.cssText =
          "position:fixed;left:" +
          rect.left +
          "px;top:" +
          rect.top +
          "px;width:" +
          rect.width +
          "px;min-width:" +
          rect.width +
          "px;height:" +
          rect.height +
          "px;box-sizing:border-box;margin:0;pointer-events:none;z-index:100000;";
        try {
          chip.setPointerCapture(e.pointerId);
        } catch (err) {}
        window.addEventListener("pointermove", onChipPointerMove);
        window.addEventListener("pointerup", onChipPointerUp);
        window.addEventListener("pointercancel", onChipPointerUp);
      }

      function onChipPointerMove(e) {
        if (!dragState) return;
        const d = dragState;
        d.chip.style.left = e.clientX - d.offsetX + "px";
        d.chip.style.top = e.clientY - d.offsetY + "px";
        document.querySelectorAll(".slot").forEach(function (s) {
          s.classList.remove("drag-over");
        });
        const under = elementUnderPointer(e.clientX, e.clientY);
        const slot = under && under.closest(".slot");
        if (slot) slot.classList.add("drag-over");
        const bank = under && under.closest("#bank");
        if (bank) el.bank.classList.add("drag-over");
        else el.bank.classList.remove("drag-over");
      }

      function elementUnderPointer(x, y) {
        return document.elementFromPoint(x, y);
      }

      function onChipPointerUp(e) {
        if (!dragState) return;
        const d = dragState;
        const chip = d.chip;
        try {
          chip.releasePointerCapture(e.pointerId);
        } catch (err) {}
        window.removeEventListener("pointermove", onChipPointerMove);
        window.removeEventListener("pointerup", onChipPointerUp);
        window.removeEventListener("pointercancel", onChipPointerUp);

        document.querySelectorAll(".slot").forEach(function (s) {
          s.classList.remove("drag-over");
        });
        el.bank.classList.remove("drag-over");

        const under = document.elementFromPoint(e.clientX, e.clientY);
        chip.classList.remove("dragging");
        chip.style.cssText = "";

        const slot = under && under.closest(".slot");
        const bankHit = under && (under.closest("#bank") || under.id === "bank");

        if (slot) {
          placeChipIn(slot, chip);
        } else if (bankHit) {
          el.bank.appendChild(chip);
        } else {
          (d.from || el.bank).appendChild(chip);
        }

        dragState = null;
        setFeedback("");
        updateCheckBtn();
      }

      function collectAnswer() {
        const slots = el.sentenceRow.querySelectorAll(".slot");
        const out = [];
        slots.forEach(function (s) {
          const c = s.querySelector(".chip");
          out.push(c ? chips[c.dataset.chipId].text : null);
        });
        return out;
      }

      function checkAnswer() {
        if (locked) return;
        const ans = collectAnswer();
        const target = LEVELS[levelIndex].words;
        const ok = ans.every(function (w, i) {
          return w === target[i];
        });
        locked = true;
        if (ok) {
          const bonus = Math.max(0, 4 - hintsUsed);
          const pts = 15 + bonus * 2;
          score += pts;
          el.score.textContent = String(score);
          setFeedback("太棒了！+" + pts + " 分", "ok");
          setTimeout(nextLevel, 850);
        } else {
          setFeedback("顺序或选词不对，可拖回单词池重排", "bad");
          el.sentenceRow.querySelectorAll(".slot").forEach(function (s) {
            s.classList.add("shake");
          });
          setTimeout(function () {
            el.sentenceRow.querySelectorAll(".slot").forEach(function (s) {
              s.classList.remove("shake");
            });
            locked = false;
            updateCheckBtn();
            setFeedback("");
          }, 550);
        }
      }

      function nextLevel() {
        levelIndex++;
        hintsUsed = 0;
        locked = false;
        if (levelIndex >= LEVELS.length) {
          locked = true;
          el.endTitle.textContent = "全部通关";
          el.endDesc.textContent = "你已经把每句英文都排对了。";
          el.endScore.textContent = String(score);
          el.overlay.classList.add("show");
          return;
        }
        loadLevel();
      }

      function loadLevel() {
        clearChipsMap();
        const L = LEVELS[levelIndex];
        applyScene(L);
        el.zhLine.textContent = L.zh;
        el.total.textContent = String(LEVELS.length);
        el.round.textContent = String(levelIndex + 1);
        el.sentenceRow.innerHTML = "";
        el.bank.innerHTML = "";
        for (let i = 0; i < L.words.length; i++) {
          const slot = document.createElement("div");
          slot.className = "slot";
          slot.dataset.index = String(i);
          el.sentenceRow.appendChild(slot);
        }
        const pool = shuffle(L.words.concat(L.decoy || []));
        pool.forEach(function (w) {
          el.bank.appendChild(makeChip(w));
        });
        setFeedback("");
        locked = false;
        updateCheckBtn();
        renderDots();
      }

      function resetGame() {
        levelIndex = 0;
        score = 0;
        hintsUsed = 0;
        el.score.textContent = "0";
        el.overlay.classList.remove("show");
        loadLevel();
      }

      el.btnCheck.addEventListener("click", checkAnswer);

      el.btnClear.addEventListener("click", function () {
        if (locked) return;
        el.sentenceRow.querySelectorAll(".slot .chip").forEach(function (c) {
          el.bank.appendChild(c);
        });
        setFeedback("");
        updateCheckBtn();
      });

      el.btnHint.addEventListener("click", function () {
        if (locked) return;
        const target = LEVELS[levelIndex].words;
        const slots = el.sentenceRow.querySelectorAll(".slot");
        let k = -1;
        for (let i = 0; i < target.length; i++) {
          const c = slots[i].querySelector(".chip");
          const got = c ? chips[c.dataset.chipId].text : null;
          if (got !== target[i]) {
            k = i;
            break;
          }
        }
        if (k < 0) return;
        const want = target[k];
        let donor = null;
        el.bank.querySelectorAll(".chip").forEach(function (c) {
          if (chips[c.dataset.chipId].text === want && !donor) donor = c;
        });
        if (!donor) {
          slots.forEach(function (s, i) {
            if (i !== k && !donor) {
              const c = s.querySelector(".chip");
              if (c && chips[c.dataset.chipId].text === want) donor = c;
            }
          });
        }
        if (!donor) return;
        hintsUsed++;
        placeChipIn(slots[k], donor);
        setFeedback("已放入第 " + (k + 1) + " 个词（得分奖励减少）", "");
        updateCheckBtn();
      });

      el.btnRestart.addEventListener("click", resetGame);

      loadLevel();
    })();
  </script>
</body>
</html>
